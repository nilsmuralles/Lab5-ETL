services:
  postgres:
    image: postgres:16
    container_name: lab5_sql
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lab5_sql
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
      - ./data/raw/sql:/tmp/data

  airflow:
      build: .
      container_name: lab5_airflow
      user: "0:0"
      ports:
        - "8080:8080"
      volumes:
        - ./dags:/opt/airflow/dags
        - ./data:/opt/airflow/data
        - airflow_db:/opt/airflow
      environment:
        AIRFLOW__CORE__EXECUTOR: SequentialExecutor
        AIRFLOW__CORE__LOAD_EXAMPLES: "false"
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
        MONGO_URI: "mongodb+srv://nilsmuralles:PASSWORD@cluster0.7r70vu6.mongodb.net/"
      command: >
        bash -c "airflow db init ;
                 airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@lab5.com ;
                 airflow webserver & airflow scheduler"

volumes:
  postgres_data:
  airflow_db:
